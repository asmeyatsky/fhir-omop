<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FHIR-to-OMOP Accelerator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'sans-serif'] },
          colors: {
            navy: { 900: '#0f172a', 800: '#1e293b', 700: '#334155', 600: '#475569' },
            teal: { 500: '#14b8a6', 400: '#2dd4bf', 600: '#0d9488' },
            gold: { 500: '#f59e0b', 400: '#fbbf24' },
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="/static/css/app.css">
</head>
<body class="bg-navy-900 text-gray-100 font-sans antialiased min-h-screen">

  <!-- Login page (shown when not authenticated) -->
  <div id="login-root" class="hidden"></div>

  <!-- App shell (shown when authenticated) -->
  <div id="app-shell" class="hidden flex min-h-screen">
    <!-- Sidebar -->
    <aside id="sidebar" class="w-64 bg-navy-800 border-r border-gray-700/50 flex flex-col fixed h-full z-30 transition-transform duration-200">
      <!-- Brand -->
      <div class="p-5 border-b border-gray-700/50">
        <div class="flex items-center gap-3">
          <div class="w-9 h-9 bg-gradient-to-br from-teal-500 to-teal-600 rounded-lg flex items-center justify-center">
            <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"/>
            </svg>
          </div>
          <div>
            <h1 class="text-sm font-semibold text-white">FHIR-to-OMOP</h1>
            <p class="text-[10px] text-gray-400 tracking-wider uppercase">Accelerator</p>
          </div>
        </div>
      </div>

      <!-- Navigation -->
      <nav class="flex-1 py-4 px-3 space-y-1 overflow-y-auto" id="nav-menu">
        <a href="#/dashboard" class="nav-link" data-page="dashboard">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zm10 0a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zm10 0a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"/></svg>
          <span>Dashboard</span>
        </a>

        <div class="pt-3 pb-1 px-3"><span class="text-[10px] font-semibold text-gray-500 uppercase tracking-wider">Data Platform</span></div>
        <a href="#/sources" class="nav-link" data-page="sources">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 12h14M5 12a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v4a2 2 0 01-2 2M5 12a2 2 0 00-2 2v4a2 2 0 002 2h14a2 2 0 002-2v-4a2 2 0 00-2-2"/></svg>
          <span>Sources</span>
        </a>
        <a href="#/mappings" class="nav-link" data-page="mappings">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"/></svg>
          <span>Mappings</span>
        </a>
        <a href="#/pipelines" class="nav-link" data-page="pipelines">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
          <span>Pipelines</span>
        </a>
        <a href="#/consent" class="nav-link" data-page="consent">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>
          <span>Consent</span>
        </a>

        <div class="pt-3 pb-1 px-3" id="admin-section-label"><span class="text-[10px] font-semibold text-gray-500 uppercase tracking-wider">Administration</span></div>
        <a href="#/users" class="nav-link admin-only" data-page="users">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197m13.5-9a2.5 2.5 0 11-5 0 2.5 2.5 0 015 0z"/></svg>
          <span>Users</span>
        </a>
        <a href="#/audit" class="nav-link audit-visible" data-page="audit">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
          <span>Audit Log</span>
        </a>
        <a href="#/tenants" class="nav-link admin-only" data-page="tenants">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/></svg>
          <span>Tenants</span>
        </a>
      </nav>

      <!-- User info -->
      <div class="p-4 border-t border-gray-700/50" id="user-info">
        <div class="flex items-center gap-3">
          <div class="w-8 h-8 bg-navy-700 rounded-full flex items-center justify-center text-sm font-medium text-teal-400" id="user-avatar"></div>
          <div class="flex-1 min-w-0">
            <p class="text-sm font-medium text-gray-200 truncate" id="user-email"></p>
            <p class="text-xs text-gray-400" id="user-role-badge"></p>
          </div>
          <button id="logout-btn" class="p-1.5 text-gray-400 hover:text-red-400 rounded transition-colors" title="Sign out">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
          </button>
        </div>
      </div>
    </aside>

    <!-- Main content -->
    <main class="flex-1 ml-64">
      <div id="page-content" class="p-6 lg:p-8 max-w-7xl mx-auto"></div>
    </main>
  </div>

  <!-- Toast container -->
  <div id="toast-container" class="fixed top-4 right-4 z-50 flex flex-col gap-2"></div>

  <!-- Modal backdrop -->
  <div id="modal-backdrop" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-40 hidden flex items-center justify-center">
    <div id="modal-content" class="bg-navy-800 rounded-xl border border-gray-700/50 shadow-2xl max-w-lg w-full mx-4 max-h-[90vh] overflow-y-auto"></div>
  </div>

  <script type="module" src="/static/js/main.js"></script>
</body>
</html>
