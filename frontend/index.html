<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FHIR-to-OMOP Accelerator</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <!-- Bootstrap 5.3 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/app.css">
</head>
<body class="d-flex flex-column min-vh-100 app-body">

  <div id="login-root" class="d-none"></div>

  <div id="app-shell" class="d-none d-flex flex-column flex-grow-1">
    <!-- Top navbar — light theme for visibility -->
    <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom">
      <div class="container-fluid px-4">
        <a class="navbar-brand d-flex align-items-center gap-2 text-dark" href="#/dashboard">
          <span class="app-logo rounded d-flex align-items-center justify-content-center bg-primary text-white">
            <i class="bi bi-database-gear"></i>
          </span>
          <span>
            <strong>FHIR-to-OMOP</strong>
            <small class="d-block text-body-secondary" style="font-size: 0.7rem; letter-spacing: 0.05em;">ACCELERATOR</small>
          </span>
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav" aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNav">
          <ul class="navbar-nav me-auto mb-2 mb-lg-0 gap-1">
            <li class="nav-item"><a class="nav-link text-dark" href="#/dashboard"><i class="bi bi-grid-1x2 me-2"></i>Dashboard</a></li>
            <li class="nav-item dropdown">
              <a class="nav-link text-dark dropdown-toggle" href="#" data-bs-toggle="dropdown">Data Platform</a>
              <ul class="dropdown-menu">
                <li><a class="dropdown-item" href="#/sources"><i class="bi bi-link-45deg me-2"></i>Sources</a></li>
                <li><a class="dropdown-item" href="#/mappings"><i class="bi bi-arrow-left-right me-2"></i>Mappings</a></li>
                <li><a class="dropdown-item" href="#/pipelines"><i class="bi bi-lightning me-2"></i>Pipelines</a></li>
                <li><a class="dropdown-item" href="#/target-records"><i class="bi bi-table me-2"></i>Target Records</a></li>
                <li><a class="dropdown-item" href="#/consent"><i class="bi bi-shield-check me-2"></i>Consent</a></li>
              </ul>
            </li>
            <li class="nav-item dropdown admin-only">
              <a class="nav-link text-dark dropdown-toggle" href="#" data-bs-toggle="dropdown">Administration</a>
              <ul class="dropdown-menu">
                <li><a class="dropdown-item" href="#/users"><i class="bi bi-people me-2"></i>Users</a></li>
                <li><a class="dropdown-item" href="#/audit"><i class="bi bi-journal-text me-2"></i>Audit Log</a></li>
                <li><a class="dropdown-item" href="#/tenants"><i class="bi bi-building me-2"></i>Tenants</a></li>
              </ul>
            </li>
            <li class="nav-item audit-visible d-lg-none"><a class="nav-link text-dark" href="#/audit"><i class="bi bi-journal-text me-2"></i>Audit</a></li>
          </ul>
          <div class="d-flex align-items-center gap-3">
            <div class="text-end d-none d-md-block" id="user-info">
              <div class="text-dark small fw-medium text-truncate" style="max-width: 180px;" id="user-email"></div>
              <div id="user-role-badge" class="small text-body-secondary"></div>
            </div>
            <div class="rounded-circle bg-primary d-flex align-items-center justify-content-center text-white fw-medium" style="width: 2.25rem; height: 2.25rem; font-size: 0.9rem;" id="user-avatar"></div>
            <button type="button" class="btn btn-outline-secondary btn-sm" id="logout-btn" title="Sign out">
              <i class="bi bi-box-arrow-right"></i>
            </button>
          </div>
        </div>
      </div>
    </nav>

    <!-- Main content -->
    <main class="flex-grow-1 app-main">
      <div class="container-fluid py-4 px-4">
        <div id="page-content" class="mx-auto" style="max-width: 1400px;"></div>
      </div>
    </main>
  </div>

  <div id="toast-container" class="position-fixed top-0 end-0 p-3 z-3" style="z-index: 1100;"></div>

  <div id="modal-backdrop" class="modal fade" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable">
      <div id="modal-content" class="modal-content"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="/static/js/main.js"></script>
</body>
</html>
